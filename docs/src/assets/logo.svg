         Back   top-left: (103, 291)
         Middle top-left: (129, 317)
         Front  top-left: (155, 343)
       NW offset between layers: (-26, -26)
       Each grid: solid green bg for occlusion, then cells, lines, bold border.

       Spatially correlated cell opacities — smooth "blob" pattern:
       Treat each cell (col c, row r) 0..4.
       A warm blob centred at (col=1.5, row=1.5) decays outward.
       High opacity ≈ 0.70 at centre, low ≈ 0.18 at corners.
       Neighbouring cells share similar values (spatial correlation).
       ═══════════════════════════════════════════════════ -->

